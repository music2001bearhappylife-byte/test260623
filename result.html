<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>室内環境フィードバック</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 480px;
    margin: 0 auto 16px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .updated { font-size: 12px; color: #bbb; margin-bottom: 20px; }
  .section-label { font-size:13px; font-weight:600; color:#888; margin-bottom:10px; }
  .dist-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .dist-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
  .dist-lbl { font-size:12px; color:#888; width:80px; flex-shrink:0; }
  .bar-bg { flex:1; background:#f0f0f0; border-radius:4px; height:10px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:4px; transition: width 0.6s ease; }
  .dist-pct { font-size:13px; font-weight:600; width:34px; text-align:right; color:#333; flex-shrink:0; }
  .loading-msg { font-size:13px; color:#aaa; margin-bottom:16px; }
  .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .metric { background: #f5f4f0; border-radius: 12px; padding: 12px 8px; text-align: center; }
  .metric .val { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .metric .unit { font-size: 12px; color: #aaa; }
  .metric .lbl { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .badge-ok   { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; margin-top:4px; background:#e6f4e6; color:#2e7d32; }
  .badge-warn { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; margin-top:4px; background:#fff3e0; color:#e65100; }
  .comfort-row { display:flex; gap:16px; flex-wrap:wrap; background:#f5f4f0; border-radius:12px; padding:12px 14px; margin-bottom:16px; font-size:13px; color:#555; }
  .energy-box {
    background: #f0faf0; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 20px; font-size: 13px; color: #2e5e2e; line-height: 1.8;
    border-left: 4px solid #4caf50;
  }
  .energy-box .energy-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #1b5e20; }
  .chart-wrap { position:relative; width:100%; height:200px; margin-bottom:8px; }
  .legend { display:flex; gap:16px; font-size:12px; color:#888; margin-bottom:20px; }
  .legend-dot { width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:4px; }
  .error-msg { font-size:12px; color:#e65100; margin-bottom:8px; }
</style>
</head>
<body>

<div class="card">
  <h1>現在の室内環境</h1>
  <p class="updated" id="updated-at">取得中…</p>

  <div class="section-label">みんなの感じ方（<span id="total-count">取得中</span>件中）</div>
  <div id="dist-bars" style="margin-bottom:20px;">
    <div class="loading-msg">回答データを読み込み中…</div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="lbl">室温</div>
      <div class="val" id="m-temp">--<span class="unit">°C</span></div>
      <span class="badge-ok" id="b-temp">取得中</span>
    </div>
    <div class="metric">
      <div class="lbl">湿度</div>
      <div class="val" id="m-hum">--<span class="unit">%</span></div>
      <span class="badge-ok" id="b-hum">取得中</span>
    </div>
  </div>

  <div class="comfort-row">
    <span>🌡 快適域：<strong>24〜27°C</strong></span>
    <span>💧 快適域：<strong>45〜60%</strong></span>
  </div>

  <div class="energy-box">
    <div class="energy-title">💡 空調の省エネ豆知識</div>
    冷房の設定温度を <strong>1°C 上げる</strong>と、空調の消費電力を約 <strong>10%</strong> 削減できます。<br>
    一般家庭（6畳エアコン）で夏の1か月あたり約 <strong>372円</strong> の節約に相当します。<br>
    <span style="font-size:11px; color:#4a7a4a;">※ 省エネルギーセンター基準。500W×8h×30日×31円/kWh×10%で算出。</span>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#D85A30"></span>室温 (°C・左軸)</span>
    <span><span class="legend-dot" style="background:#378ADD;"></span>湿度 (%・右軸)</span>
  </div>

  <div class="chart-wrap">
    <canvas id="chart" role="img" aria-label="本日の室温と湿度の時間推移"></canvas>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxtWda-N2BPKWYq5vX_lPVdczNkH2XSSKn84AKeGH7AGnuiHaDXBNHNFtyC9XuNPwo/exec';

const OPTS = [
  { v:5, icon:'🥵', label:'とても暑い', formLabel:'とても暑い（汗ばむほど暑い）' },
  { v:4, icon:'😓', label:'やや暑い',   formLabel:'やや暑い（少し暑さを感じる）' },
  { v:3, icon:'😊', label:'ちょうどよい', formLabel:'ちょうどよい（快適）' },
  { v:2, icon:'☹️', label:'やや寒い',   formLabel:'やや寒い（少し肌寒い）' },
  { v:1, icon:'😖', label:'とても寒い', formLabel:'とても寒い（震えてしまうほど寒い）' },
];
const BAR_COLORS = { 5:'#D85A30', 4:'#EF9F27', 3:'#639922', 2:'#378ADD', 1:'#534AB7' };

function renderDist(counts, total) {
  document.getElementById('total-count').textContent = total;
  const container = document.getElementById('dist-bars');
  container.innerHTML = OPTS.map(o => {
    const cnt = counts[o.formLabel] || 0;
    const pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    return `<div class="dist-row">
      <div class="dist-icon">${o.icon}</div>
      <div class="dist-lbl">${o.label}</div>
      <div class="bar-bg">
        <div class="bar-fill" style="width:${pct}%;background:${BAR_COLORS[o.v]}"></div>
      </div>
      <div class="dist-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function fetchGASData() {
  const callbackName = 'gasCallback_' + Date.now();
  const script = document.createElement('script');
  script.src = GAS_URL + '?callback=' + callbackName;
  window[callbackName] = function(data) {
    document.getElementById('dist-bars').innerHTML = '';
    if (data && data.counts) {
      renderDist(data.counts, data.total);
    } else {
      document.getElementById('dist-bars').innerHTML =
        '<div class="error-msg">回答データを取得できませんでした。</div>';
    }
    delete window[callbackName];
    script.remove();
  };
  script.onerror = function() {
    document.getElementById('dist-bars').innerHTML =
      '<div class="error-msg">通信エラー。しばらくしてから再読み込みしてください。</div>';
    delete window[callbackName];
    script.remove();
  };
  document.head.appendChild(script);
}

fetchGASData();
setInterval(fetchGASData, 2 * 60 * 1000);

// =============================================
// グラフの軸ラベルを7:00〜21:00で固定
// =============================================
const FIXED_LABELS = [
  '07:00','08:00','09:00','10:00','11:00','12:00','13:00',
  '14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'
];

fetch('./data.json')
  .then(r => r.json())
  .then(d => {
    document.getElementById('m-temp').innerHTML =
      d.temperature + '<span style="font-size:12px;color:#aaa">°C</span>';
    document.getElementById('m-hum').innerHTML  =
      d.humidity    + '<span style="font-size:12px;color:#aaa">%</span>';

    const tempOk = d.temperature >= 24 && d.temperature <= 27;
    const humOk  = d.humidity    >= 45 && d.humidity    <= 60;
    const b = (ok, okTxt, ngTxt) =>
      `<span class="${ok ? 'badge-ok' : 'badge-warn'}">${ok ? okTxt : ngTxt}</span>`;
    document.getElementById('b-temp').outerHTML = b(tempOk, '快適域内', '範囲外');
    document.getElementById('b-hum').outerHTML  = b(humOk,  '快適域内', '範囲外');

    const dt = new Date(d.updated_at);
    document.getElementById('updated-at').innerHTML =
      `${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')} 時点のデータ`;

    // historyを7:00〜21:00のラベルにマッピング
    const historyMap = {};
    (d.history || []).forEach(h => { historyMap[h.time] = h; });

    const temps = FIXED_LABELS.map(l => historyMap[l] ? historyMap[l].temp : null);
    const hums  = FIXED_LABELS.map(l => historyMap[l] ? historyMap[l].hum  : null);

    new Chart(document.getElementById('chart'), {
      type: 'line',
      data: {
        labels: FIXED_LABELS,
        datasets: [
          {
            label:'室温', data: temps,
            borderColor:'#D85A30', backgroundColor:'rgba(216,90,48,0.08)',
            fill:true, tension:0.4, pointRadius:3, yAxisID:'y',
            spanGaps: false
          },
          {
            label:'湿度', data: hums,
            borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.08)',
            fill:true, tension:0.4, pointRadius:3, borderDash:[5,3], yAxisID:'y2',
            spanGaps: false
          }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          y:  { min:16, max:32,
                title:{display:true, text:'温度(°C)', font:{size:11}},
                grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{size:11}} },
          y2: { position:'right', min:35, max:75,
                title:{display:true, text:'湿度(%)', font:{size:11}},
                grid:{display:false}, ticks:{font:{size:11}} },
          x:  { ticks:{font:{size:11}, autoSkip:true, maxRotation:0, maxTicksLimit:8} }
        }
      }
    });
  })
  .catch(() => {
    document.getElementById('updated-at').textContent = 'センサーデータ読み込みエラー';
  });
</script>
</body>
</html>
